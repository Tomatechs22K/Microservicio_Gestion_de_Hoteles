version: '3.8'

services:

  # Base de datos MySQL compartida
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hotelgest-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Servidor Eureka
  ms-eureka-server:
    build: ./ms-eureka-server
    container_name: ms-eureka-server
    ports:
      - "8761:8761"
    networks:
      - hotelgest-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Microservicio Hoteles
  ms-hoteles:
    build: ./ms-hoteles
    container_name: ms-hoteles
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/hoteles_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://ms-eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      ms-eureka-server:
        condition: service_healthy
    networks:
      - hotelgest-network

  # Microservicio Usuarios
  ms-usuarios:
    build: ./ms-usuarios
    container_name: ms-usuarios
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/usuarios_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://ms-eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      ms-eureka-server:
        condition: service_healthy
    networks:
      - hotelgest-network

  # Microservicio Clientes
  ms-clientes:
    build: ./ms-clientes
    container_name: ms-clientes
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/clientes_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://ms-eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      ms-eureka-server:
        condition: service_healthy
    networks:
      - hotelgest-network

  # Microservicio Habitaciones
  ms-habitaciones:
    build: ./ms-habitaciones
    container_name: ms-habitaciones
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/habitaciones_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://ms-eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      ms-eureka-server:
        condition: service_healthy
    networks:
      - hotelgest-network

  # API Gateway
  ms-gateway:
    build: ./ms-gateway
    container_name: ms-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://ms-eureka-server:8761/eureka/
    depends_on:
      - ms-eureka-server
      - ms-hoteles
      - ms-usuarios
      - ms-clientes
      - ms-habitaciones
    networks:
      - hotelgest-network

networks:
  hotelgest-network:
    driver: bridge

volumes:
  mysql_data:
